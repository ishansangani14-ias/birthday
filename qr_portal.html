<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday QR Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
            --bg: #fdfbfb;
            --text: #2d3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 {
            color: #d13061;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 800;
        }

        p {
            color: #636e72;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }

        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }

        #qrcode:hover {
            transform: scale(1.02);
        }

        .info-box {
            background: #fff5f6;
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed #ffb8b8;
            margin-top: 20px;
            text-align: left;
        }

        .info-box h3 {
            color: #d13061;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .ip-display {
            font-weight: 600;
            color: #ff758c;
            font-size: 14px;
            margin-top: 10px;
            display: block;
            word-break: break-all;
        }

        .btn {
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #ffeaa7;
            color: #d35400;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">OFFICIAL LINK READY</span>
        <h1>Birthday QR Portal</h1>
        <p>Scan this QR code to view your birthday surprise surprise live on GitHub!</p>
        
        <div id="qrcode"></div>
        
        <div class="info-box">
            <h3>Your Official Link:</h3>
            <span id="current-url" class="ip-display">https://ishansangani14-ias.github.io/birthday/</span>
            <p style="margin-top: 15px; font-size: 13px; color: #d13061;"><strong>Password:</strong> Bathya Bapu</p>
        </div>

        <button class="btn" onclick="window.print()">Print QR Invitation</button>
    </div>

    <script>
        const finalURL = "https://ishansangani14-ias.github.io/birthday/";

        // Generate QR Code
        new QRCode(document.getElementById("qrcode"), {
            text: finalURL,
            width: 250,
            height: 250,
            colorDark : "#d13061",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
